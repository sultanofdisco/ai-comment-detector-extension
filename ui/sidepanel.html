<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 댓글 탐지기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ── 변수 및 기본 스타일 ── */
    :root {
      --bg:        #0f0f0f;
      --surface:    #1a1a1a;
      --border:     #2a2a2a;
      --text:       #e8e8e8;
      --sub:        #777;
      --low:        #6b7280;
      --medium:     #d97706;
      --high:       #dc2626;
      --mono:       'DM Mono', monospace;
      --sans:       'Noto Sans KR', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      min-height: 100vh;
      padding: 16px;
      overflow-y: auto; /* 결과가 많아지면 스크롤 가능하게 */
    }

    /* ── 헤더 ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .header-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--high);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    .header-title {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--sub);
      text-transform: uppercase;
    }

    /* ── 대기 상태 ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 200px;
      color: var(--sub);
      font-size: 12px;
      font-family: var(--mono);
      text-align: center;
    }
    .empty-icon {
      font-size: 28px;
      opacity: 0.4;
    }

    /* ── 카드 스타일 ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
      animation: slidein 0.22s ease;
    }
    @keyframes slidein {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .pred-label {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    .risk-badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 9999px;
      color: #fff;
    }
    .risk-badge--low    { background: var(--low); }
    .risk-badge--medium { background: var(--medium); }
    .risk-badge--high   { background: var(--high); }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 10px 0;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }
    .stat-label {
      font-size: 11px;
      color: var(--sub);
      font-family: var(--mono);
    }
    .stat-value {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--text);
    }

    .bar-wrap { margin-top: 12px; }
    .bar-bg {
      background: var(--border);
      border-radius: 9999px;
      height: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 9999px;
      transition: width 0.4s ease;
    }

    .top2-section { margin-top: 12px; }
    .top2-title {
      font-size: 10px;
      color: var(--sub);
      font-family: var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .top2-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .top2-name {
      font-family: var(--mono);
      font-size: 11px;
      width: 72px;
      flex-shrink: 0;
    }
    .top2-bar-bg {
      flex: 1;
      background: var(--border);
      border-radius: 9999px;
      height: 3px;
      overflow: hidden;
    }
    .top2-bar-fill {
      height: 100%;
      background: var(--sub);
      border-radius: 9999px;
      transition: width 0.4s ease;
    }
    .top2-bar-fill--first { background: var(--text); }
    .top2-pct {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--sub);
      width: 36px;
      text-align: right;
    }

    .author-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .author-handle {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--sub);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-dot"></div>
    <span class="header-title">AI Detector Status</span>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🔍</div>
    <div>분석된 AI 댓글이 없습니다</div>
    <div>트위터를 탐색하면 실시간으로<br/>의심 댓글을 찾아냅니다</div>
  </div>

  <div id="resultList"></div>

  <script src="sidepanel.js"></script>

</body>
</html>
